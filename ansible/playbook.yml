- name: Configure simulated server
  hosts: all
  become: yes

  tasks:
    - name: Install nginx
      package:
        name: nginx
        state: present

    - name: Create index page
      copy:
        content: "DevOps Lab - Nginx running"
        dest: /var/www/html/index.html

    - name: Start nginx
      service:
        name: nginx
        state: started
        enabled: yes
